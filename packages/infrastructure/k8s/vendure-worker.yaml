apiVersion: apps/v1
kind: Deployment
metadata:
  name: vendure-worker
  namespace: simket
  labels:
    app.kubernetes.io/name: vendure-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: simket
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vendure-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vendure-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: simket
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: vendure-worker
          image: simket/vendure-server:latest
          env:
            - name: VENDURE_WORKER
              value: "true"
          envFrom:
            - configMapRef:
                name: vendure-config
            - secretRef:
                name: vendure-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vendure-worker
  namespace: simket
  labels:
    app.kubernetes.io/name: vendure-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: simket
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vendure-worker
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Pods
      pods:
        metric:
          name: bullmq_queue_depth
        target:
          type: AverageValue
          averageValue: "100"
