apiVersion: apps/v1
kind: Deployment
metadata:
  name: vendure-server
  namespace: simket
  labels:
    app.kubernetes.io/name: vendure-server
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: simket
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vendure-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vendure-server
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: simket
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: vendure-server
          image: simket/vendure-server:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: vendure-config
            - secretRef:
                name: vendure-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 15
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 30
          startupProbe:
            httpGet:
              path: /health/startup
              port: 3000
            failureThreshold: 30
            periodSeconds: 5
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vendure-server
  namespace: simket
  labels:
    app.kubernetes.io/name: vendure-server
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: simket
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vendure-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vendure-server
  namespace: simket
  labels:
    app.kubernetes.io/name: vendure-server
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: simket
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vendure-server
