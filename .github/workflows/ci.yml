# Simket CI Pipeline
# Runs on every push and PR to main.
# Steps: install → typecheck → lint → test → build
#
# Governing docs:
#   - docs/architecture.md §11 (CI/CD)
#   - AGENTS.md §7 (TDD workflow)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.4'

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: simket
          POSTGRES_PASSWORD: simket_test
          POSTGRES_DB: simket_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U simket"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm turbo run build --filter=@simket/shared

      - name: Type check
        run: pnpm turbo run typecheck
        continue-on-error: true  # Pre-existing TS errors — will be fixed incrementally

      - name: Lint
        run: pnpm turbo run lint
        continue-on-error: true  # ESLint not yet configured in all packages

      - name: Unit tests
        run: pnpm turbo run test
        env:
          DATABASE_URL: postgres://simket:simket_test@localhost:5432/simket_test
          REDIS_URL: redis://localhost:6379

      - name: Build all packages
        run: pnpm turbo run build

      - name: Format check
        run: pnpm format:check
        continue-on-error: true
